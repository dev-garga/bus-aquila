<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bus AQ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bus AQ">
<style>
  :root {
    --bg: #0a0c12;
    --glass:         rgba(30, 34, 48, 0.55);
    --glass-strong:  rgba(40, 46, 64, 0.70);
    --glass-border:  rgba(255, 255, 255, 0.08);
    --glass-edge:    rgba(255, 255, 255, 0.14);
    --text:    #f0f2f7;
    --muted:   rgba(240, 242, 247, 0.58);
    --mute2:   rgba(240, 242, 247, 0.34);
    --accent:        #5b95ff;
    --accent-glow:   rgba(91, 149, 255, 0.40);
    --accent2:       #ff8e54;
    --accent2-glow:  rgba(255, 142, 84, 0.40);
    --green:   #4ed084;
    --orange:  #ffb547;
    --red:     #ff6262;
    --radius:    20px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    font-weight: 500;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 480px; margin: 0 auto;
    position: relative; overflow-x: hidden;
  }

  /* Ambient color blobs diffused behind every glass surface */
  body::before {
    content: ''; position: fixed; inset: -10%;
    background:
      radial-gradient(circle at 15% 12%, rgba(91, 149, 255, 0.40), transparent 45%),
      radial-gradient(circle at 85% 88%, rgba(255, 142, 84, 0.28), transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(140, 80, 220, 0.18), transparent 55%);
    filter: blur(40px);
    z-index: -1; pointer-events: none;
  }

  /* ── Header ── */
  header {
    padding: 22px 22px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .app-icon { font-size: 26px; line-height: 1; }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: -0.015em; line-height: 1; }
  .app-subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; letter-spacing: 0.01em; }
  .clock {
    font-size: 16px; color: var(--text); margin-left: auto;
    font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: 0.02em;
  }

  /* ── Direction toggle ── */
  .dir-bar { display: flex; gap: 10px; padding: 0 18px 12px; }
  .dir-btn {
    flex: 1; padding: 14px 10px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center; line-height: 1.3;
    letter-spacing: 0.01em;
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 6px 24px rgba(0, 0, 0, 0.22);
    transition: all .2s ease;
  }
  .dir-btn.active {
    background: linear-gradient(180deg, rgba(91, 149, 255, 0.42), rgba(91, 149, 255, 0.18));
    border-color: rgba(91, 149, 255, 0.55);
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      0 0 32px var(--accent-glow),
      0 6px 24px rgba(0, 0, 0, 0.22);
  }
  .dir-btn.active.home {
    background: linear-gradient(180deg, rgba(255, 142, 84, 0.42), rgba(255, 142, 84, 0.18));
    border-color: rgba(255, 142, 84, 0.55);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      0 0 32px var(--accent2-glow),
      0 6px 24px rgba(0, 0, 0, 0.22);
  }

  /* ── Stop chips ── */
  .stops-row { display: flex; align-items: center; gap: 10px; padding: 0 18px 16px; }
  .stop-chip {
    flex: 1; padding: 11px 14px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; flex-direction: column;
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 4px 16px rgba(0, 0, 0, 0.20);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .stop-chip.active {
    border-color: rgba(91, 149, 255, 0.40);
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 0 18px var(--accent-glow);
  }
  .stop-chip .label { font-size: 10px; color: var(--mute2); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin-bottom: 3px; }
  .stop-chip .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stop-arrow { color: var(--mute2); font-size: 18px; flex-shrink: 0; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.50);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 480px;
    background: var(--glass-strong);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    padding: 20px 14px 36px;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32, .72, 0, 1);
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 -12px 40px rgba(0, 0, 0, 0.40);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 12px; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-weight: 600; padding-left: 8px; }
  .stop-option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px; border-radius: 14px; cursor: pointer; margin-bottom: 4px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid transparent;
    transition: all .15s ease;
  }
  .stop-option:active { background: rgba(255, 255, 255, 0.06); }
  .stop-option.selected {
    background: rgba(91, 149, 255, 0.13);
    border-color: rgba(91, 149, 255, 0.32);
  }
  .stop-option .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--mute2); flex-shrink: 0;
  }
  .stop-option.selected .dot {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .stop-option span { font-size: 15px; font-weight: 500; }

  /* ── Cards ── */
  .cards { flex: 1; overflow-y: auto; padding: 0 18px 24px; display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--glass);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: grid; grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 4px 12px; align-items: center;
    position: relative;
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 8px 28px rgba(0, 0, 0, 0.25);
    transition: opacity .2s ease;
  }
  .card.next {
    border-color: rgba(91, 149, 255, 0.45);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.20),
      0 0 28px rgba(91, 149, 255, 0.28),
      0 8px 28px rgba(0, 0, 0, 0.30);
  }
  .card.past { opacity: 0.50; }

  .linea-badge {
    grid-row: span 2;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 12px;
    padding: 8px 12px; text-align: center; min-width: 52px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .linea-badge .num { font-size: 20px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -0.02em; }
  .linea-badge .sub { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 600; letter-spacing: 0.06em; }

  .times { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; min-width: 0; }
  .dep-time { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .arr-label { font-size: 10px; color: var(--mute2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .arr-time { font-size: 13px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
  .stop-names { font-size: 11px; color: var(--mute2); font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .countdown {
    grid-row: span 2; text-align: center;
    font-size: 12px; font-weight: 700;
    padding: 6px 10px; border-radius: 999px;
    white-space: nowrap; align-self: center;
    border: 1px solid transparent;
    letter-spacing: 0.01em;
    justify-self: end;
  }
  .countdown.now {
    color: var(--green);
    background: rgba(78, 208, 132, 0.14);
    border-color: rgba(78, 208, 132, 0.28);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 0 18px rgba(78, 208, 132, 0.22);
  }
  .countdown.soon {
    color: var(--orange);
    background: rgba(255, 181, 71, 0.13);
    border-color: rgba(255, 181, 71, 0.28);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .countdown.later {
    color: var(--muted);
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.05);
  }
  .countdown.past {
    color: var(--mute2);
    background: rgba(255, 255, 255, 0.04);
    font-size: 12px; font-weight: 600;
  }

  .scolastica-tag, .feriale-tag {
    position: absolute; top: 9px; right: 10px;
    font-size: 9px; padding: 3px 7px; border-radius: 999px;
    font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    border: 1px solid transparent;
  }
  .scolastica-tag { color: var(--muted); background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.05); }
  .feriale-tag { color: var(--orange); background: rgba(255, 181, 71, 0.10); border-color: rgba(255, 181, 71, 0.22); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 56px 16px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .empty strong { color: var(--text); font-weight: 700; display: block; margin-bottom: 6px; font-size: 17px; letter-spacing: -0.01em; }
  .empty .empty-icon { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.7; }

  /* ── Glass buttons (show more / show past) ── */
  .show-more, .show-past {
    width: 100%; padding: 13px 16px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 13px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.01em;
    box-shadow:
      inset 0 1px 0 var(--glass-edge),
      0 4px 18px rgba(0, 0, 0, 0.20);
    transition: background .15s ease;
  }
  .show-past {
    color: var(--mute2); font-size: 12px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.025);
  }
  .show-more:active, .show-past:active { background: rgba(255, 255, 255, 0.06); }

  /* ── Day banner ── */
  .day-banner {
    margin: 0 18px 14px;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(255, 181, 71, 0.18), rgba(255, 181, 71, 0.08));
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 181, 71, 0.28);
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600;
    color: var(--orange);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    box-shadow: inset 0 1px 0 rgba(255, 181, 71, 0.18);
  }
  .day-banner.sunday {
    background: linear-gradient(180deg, rgba(255, 98, 98, 0.18), rgba(255, 98, 98, 0.08));
    border-color: rgba(255, 98, 98, 0.28);
    color: var(--red);
    box-shadow: inset 0 1px 0 rgba(255, 98, 98, 0.18);
  }
  .day-banner-toggle {
    font-size: 11px; font-weight: 700;
    background: rgba(0, 0, 0, 0.22);
    border: 1px solid currentColor;
    color: inherit;
    padding: 5px 11px; border-radius: 999px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  /* ── Info bar ── */
  .info-bar {
    padding: 4px 20px 20px; font-size: 11px; color: var(--mute2); line-height: 1.5; text-align: center;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <span class="app-icon">&#x1F68C;</span>
  <div>
    <div class="app-title">Bus AQ</div>
    <div class="app-subtitle">AMA L'Aquila</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="dir-bar">
  <button class="dir-btn active" id="btn-uni" onclick="setDir('uni')">
    &#x1F3EB; Vado<br>all'Università
  </button>
  <button class="dir-btn home" id="btn-home" onclick="setDir('home')">
    &#x1F3E0; Torno<br>a Casa
  </button>
</div>

<div class="stops-row">
  <div class="stop-chip active" id="chip-origin" onclick="openPicker('origin')">
    <div class="label">Da</div>
    <div class="name" id="origin-name">Viale Gran Sasso</div>
  </div>
  <span class="stop-arrow">&#x2192;</span>
  <div class="stop-chip" id="chip-dest" onclick="openPicker('dest')">
    <div class="label">A</div>
    <div class="name" id="dest-name">Coppito</div>
  </div>
</div>

<div class="day-banner" id="day-banner" style="display:none">
  <span id="day-banner-text">&#x1F4C5; Sabato &middot; corse ridotte</span>
  <button class="day-banner-toggle" id="day-banner-toggle" onclick="toggleShowAll()">Mostra tutte</button>
</div>

<div class="cards" id="cards">
  <div class="empty">Caricamento orari&hellip;</div>
</div>

<div class="info-bar" id="info-bar"></div>

<!-- Stop picker modal -->
<div class="modal-overlay" id="modal" onclick="closePicker(event)">
  <div class="modal">
    <h3 id="modal-title">Seleziona fermata</h3>
    <div id="modal-options"></div>
  </div>
</div>

<script>
// ── Data & state ──────────────────────────────
let schedule = null;
let dir = 'uni';
let originStop = 'gran_sasso';
let destStop   = 'uni';
let pickerFor  = null;
let showAllTrips = false;
let showPast = false;
let visibleCount = 3;

const STOPS = {
  gran_sasso:    { label: 'Viale Gran Sasso',     short: 'Gran Sasso' },
  terminal:      { label: 'Terminal Collemaggio', short: 'Collemaggio' },
  aquilone:      { label: "L'Aquilone",            short: 'Aquilone' },
  uni:           { label: 'Univ. Coppito',         short: 'Coppito' },
};

const ROUTE_KEYS = {
  'gran_sasso_uni':  { keys: ['to_uni'] },
  'uni_gran_sasso':  { keys: ['to_home'] },
  'terminal_uni':    { keys: ['terminal_to_uni'] },
  'uni_terminal':    { keys: ['uni_to_terminal'] },
  'aquilone_uni':    { keys: ['aquilone_to_uni'] },
  'uni_aquilone':    { keys: ['uni_to_aquilone'] },
};

const LINE_LABELS = {
  linea1:   { num: '1',   sub: '' },
  linea2ut: { num: '2',   sub: 'UT' },
  linea4:   { num: '4',   sub: '' },
  linea6sd: { num: '6',   sub: 'S/D' },
};

// ── Helpers ───────────────────────────────────
function toMin(hhmm) { const [h, m] = hhmm.split(':').map(Number); return h * 60 + m; }
function nowMin() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }
function fmt(hhmm) { return hhmm; }
function diffLabel(diff) {
  if (diff >= -2 && diff < 2) return ['Ora', 'now'];
  if (diff < 0) {
    const m = -diff;
    if (m < 60) return [`${m}m fa`, 'past'];
    const h = Math.floor(m / 60), rest = m % 60;
    return [rest > 0 ? `${h}h ${rest}m fa` : `${h}h fa`, 'past'];
  }
  if (diff < 60)  return [`${diff} min`, diff < 10 ? 'now' : 'soon'];
  const h = Math.floor(diff / 60), m = diff % 60;
  return [m > 0 ? `${h}h ${m}m` : `${h}h`, 'later'];
}

// ── Load schedule ─────────────────────────────
fetch('schedule.json')
  .then(r => r.json())
  .then(data => { schedule = data; render(); setInterval(render, 30000); })
  .catch(() => {
    document.getElementById('cards').innerHTML =
      '<div class="empty"><span class="empty-icon">&#x26A0;&#xFE0F;</span><strong>Errore di rete</strong>Impossibile caricare gli orari.<br>Riprova dopo aver ripristinato la connessione.</div>';
  });

// ── Clock ─────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
updateClock(); setInterval(updateClock, 10000);

// ── Direction control ─────────────────────────
function setDir(d) {
  dir = d;
  document.getElementById('btn-uni').classList.toggle('active', d === 'uni');
  document.getElementById('btn-home').classList.toggle('active', d === 'home');
  if (d === 'uni') { originStop = 'gran_sasso'; destStop = 'uni'; }
  else             { originStop = 'uni'; destStop = 'gran_sasso'; }
  visibleCount = 3; showPast = false;
  updateChips(); render();
}

function updateChips() {
  document.getElementById('origin-name').textContent = STOPS[originStop].label;
  document.getElementById('dest-name').textContent   = STOPS[destStop].short;
}

// ── Stop picker ───────────────────────────────
const ORIGIN_OPTS_UNI  = ['gran_sasso', 'terminal', 'aquilone'];
const ORIGIN_OPTS_HOME = ['uni'];
const DEST_OPTS_UNI    = ['uni'];
const DEST_OPTS_HOME   = ['gran_sasso', 'terminal', 'aquilone'];

function openPicker(which) {
  pickerFor = which;
  const opts = which === 'origin'
    ? (dir === 'uni' ? ORIGIN_OPTS_UNI : ORIGIN_OPTS_HOME)
    : (dir === 'uni' ? DEST_OPTS_UNI   : DEST_OPTS_HOME);
  if (opts.length <= 1) return;

  const current = which === 'origin' ? originStop : destStop;
  document.getElementById('modal-title').textContent =
    which === 'origin' ? 'Fermata di partenza' : 'Fermata di arrivo';
  document.getElementById('modal-options').innerHTML = opts.map(s => `
    <div class="stop-option ${s === current ? 'selected' : ''}" onclick="selectStop('${s}')">
      <div class="dot"></div>
      <span>${STOPS[s].label}</span>
    </div>`).join('');
  document.getElementById('modal').classList.add('open');
}

function closePicker(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

function selectStop(s) {
  if (pickerFor === 'origin') originStop = s; else destStop = s;
  document.getElementById('modal').classList.remove('open');
  visibleCount = 3; showPast = false;
  updateChips(); render();
}

// ── Show more / Show past ─────────────────────
function showMore() { visibleCount += 3; render(); }
function togglePast() { showPast = !showPast; render(); }

// ── Saturday "show all" toggle ────────────────
function toggleShowAll() {
  showAllTrips = !showAllTrips;
  document.getElementById('day-banner-toggle').textContent = showAllTrips ? 'Solo sabato' : 'Mostra tutte';
  render();
}

// ── Trips computation ─────────────────────────
function getTrips() {
  if (!schedule) return { past: [], future: [] };
  const day = new Date().getDay();
  if (day === 0) return { past: [], future: [] }; // Sunday → no service

  const routeKey = `${originStop}_${destStop}`;
  const def = ROUTE_KEYS[routeKey];
  if (!def) return { past: [], future: [] };

  const now = nowMin();
  const isSaturday = day === 6;
  const past = [];
  const future = [];

  for (const [lineKey, lineData] of Object.entries(schedule)) {
    for (const key of def.keys) {
      const trips = lineData[key];
      if (!trips) continue;
      for (const trip of trips) {
        if (isSaturday && trip.no_saturday && !showAllTrips) continue;
        const depMin = toMin(trip.dep);
        const diff = depMin - now;
        const entry = {
          dep: trip.dep, arr: trip.arr,
          linea: lineKey,
          variant: trip.linea || null,
          scolastica: trip.scolastica,
          no_saturday: trip.no_saturday,
          depMin, diff
        };
        if (diff < -2) {
          if (diff > -60) past.push(entry); // keep up to 1h ago
        } else {
          future.push(entry);
        }
      }
    }
  }
  const sorter = (a, b) => a.depMin - b.depMin || a.linea.localeCompare(b.linea);
  past.sort(sorter); future.sort(sorter);
  return { past, future };
}

// ── Render ────────────────────────────────────
function render() {
  if (!schedule) return;
  const day = new Date().getDay();
  const isSunday = day === 0;
  const isSaturday = day === 6;

  // Banner
  const banner = document.getElementById('day-banner');
  const bannerText = document.getElementById('day-banner-text');
  const bannerToggle = document.getElementById('day-banner-toggle');
  if (isSunday) {
    banner.style.display = 'flex';
    banner.classList.add('sunday');
    bannerText.innerHTML = '\u{1F6AB} Domenica · servizio non attivo';
    bannerToggle.style.display = 'none';
  } else if (isSaturday) {
    banner.style.display = 'flex';
    banner.classList.remove('sunday');
    bannerText.innerHTML = '\u{1F4C5} Sabato · corse ridotte';
    bannerToggle.style.display = '';
  } else {
    banner.style.display = 'none';
  }

  const container = document.getElementById('cards');
  const infoBar = document.getElementById('info-bar');

  if (isSunday) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">\u{1F634}</span><strong>Domenica · nessun bus</strong>AMA non effettua corse di domenica.<br>Riprova lunedì mattina!</div>';
    infoBar.textContent = '';
    return;
  }

  const { past, future } = getTrips();

  if (future.length === 0 && past.length === 0) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">\u{1F4A4}</span><strong>Nessuna corsa</strong>Non ci sono altre corse oggi.<br>Controlla domani mattina!</div>';
    infoBar.textContent = '';
    return;
  }

  let html = '';

  // "Show past" button at top
  if (past.length > 0) {
    const recentCount = Math.min(past.length, 3);
    html += `<button class="show-past" onclick="togglePast()">${
      showPast ? '↓ Nascondi precedenti' : `↑ Mostra ${recentCount} corse precedenti`
    }</button>`;
  }

  // Build the list: past (if showing) + future
  const tripsToShow = [];
  if (showPast) tripsToShow.push(...past.slice(-3));
  const firstFutureIdx = tripsToShow.length;
  tripsToShow.push(...future.slice(0, visibleCount));

  const fromLabel = STOPS[originStop]?.short || originStop;
  const toLabel   = STOPS[destStop]?.short   || destStop;

  html += tripsToShow.map((trip, i) => {
    const isPast = trip.diff < -2;
    const lb = LINE_LABELS[trip.linea] || { num: '?', sub: '' };
    const [cntTxt, cntClass] = diffLabel(trip.diff) || ['–', 'later'];
    const isNext = !isPast && i === firstFutureIdx;

    return `
    <div class="card${isNext ? ' next' : ''}${isPast ? ' past' : ''}">
      <div class="linea-badge">
        <div class="num">${lb.num}</div>
        ${trip.variant ? `<div class="sub">${trip.variant}</div>` : (lb.sub ? `<div class="sub">${lb.sub}</div>` : '')}
      </div>
      <div class="times">
        <span class="dep-time">${fmt(trip.dep)}</span>
        <span class="arr-label">arr.</span>
        <span class="arr-time">${fmt(trip.arr)}</span>
      </div>
      <div class="countdown ${cntClass}">${cntTxt}</div>
      <div class="stop-names">${fromLabel} → ${toLabel}</div>
      ${trip.scolastica ? '<div class="scolastica-tag">scolastica</div>' : ''}
      ${(isSaturday && showAllTrips && trip.no_saturday) ? '<div class="feriale-tag">solo feriale</div>' : ''}
    </div>`;
  }).join('');

  // Show more button
  const remaining = future.length - visibleCount;
  if (remaining > 0) {
    html += `<button class="show-more" onclick="showMore()">Mostra altre ${Math.min(remaining, 3)} corse</button>`;
  }

  container.innerHTML = html;

  // Info bar
  const lastTrip = future[future.length - 1];
  if (lastTrip) {
    infoBar.textContent = remaining > 0
      ? `+${remaining} cors${remaining === 1 ? 'a' : 'e'} fino alle ${lastTrip.dep}`
      : `Ultima corsa alle ${lastTrip.dep}`;
  } else {
    infoBar.textContent = '';
  }
}

// ── Service Worker ────────────────────────────
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('sw.js').catch(() => {});

// ── Init ──────────────────────────────────────
updateChips();
</script>
</body>
</html>
