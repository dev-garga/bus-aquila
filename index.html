<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bus AQ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bus AQ">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #f7934f;
    --text: #e8eaf0;
    --muted: #8890a4;
    --green: #4fc47a;
    --orange: #f5a623;
    --red: #f74f4f;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 480px; margin: 0 auto;
  }

  /* ── Header ── */
  header {
    padding: 20px 20px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .clock {
    font-size: 15px; color: var(--muted); font-variant-numeric: tabular-nums; margin-left: auto;
  }

  /* ── Direction toggle ── */
  .dir-bar {
    display: flex; gap: 8px; padding: 0 16px 14px;
  }
  .dir-btn {
    flex: 1; padding: 12px 8px; border-radius: var(--radius);
    border: 2px solid transparent; background: var(--surface);
    color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s; text-align: center; line-height: 1.3;
  }
  .dir-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .dir-btn.active.home {
    background: var(--accent2); border-color: var(--accent2);
  }

  /* ── Stop selectors ── */
  .stops-row {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px 16px;
  }
  .stop-chip {
    display: flex; flex-direction: column;
    background: var(--surface); border-radius: 12px;
    padding: 10px 14px; flex: 1; cursor: pointer; border: 2px solid transparent;
    transition: border-color .15s;
  }
  .stop-chip.active { border-color: var(--accent); }
  .stop-chip .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .stop-chip .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stop-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

  /* ── Stop picker modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0; padding: 20px 16px 36px;
    transform: translateY(100%); transition: transform .25s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 15px; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .stop-option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; border-radius: 12px; cursor: pointer; margin-bottom: 6px;
    transition: background .1s;
  }
  .stop-option:hover, .stop-option:active { background: var(--surface2); }
  .stop-option.selected { background: var(--surface2); }
  .stop-option .dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
  }
  .stop-option.selected .dot { background: var(--green); }
  .stop-option span { font-size: 15px; font-weight: 500; }

  /* ── Cards ── */
  .cards { flex: 1; overflow-y: auto; padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface); border-radius: var(--radius); padding: 16px 18px;
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 4px 12px; align-items: center; position: relative;
  }
  .card.next { border: 1px solid rgba(79,142,247,.35); }

  .linea-badge {
    grid-row: span 2; background: var(--surface2); border-radius: 10px;
    padding: 8px 10px; text-align: center; min-width: 48px;
  }
  .linea-badge .num { font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
  .linea-badge .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .times { display: flex; align-items: baseline; gap: 6px; }
  .dep-time { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .arr-label { font-size: 12px; color: var(--muted); }
  .arr-time { font-size: 14px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }

  .stop-names { font-size: 11px; color: var(--muted); }

  .countdown {
    grid-row: span 2; text-align: right;
    font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; align-self: center;
  }
  .countdown.now { color: var(--green); background: rgba(79,196,122,.12); }
  .countdown.soon { color: var(--orange); background: rgba(245,166,35,.12); }
  .countdown.later { color: var(--muted); background: var(--surface2); }

  .scolastica-tag {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: var(--muted); background: var(--surface2);
    padding: 2px 6px; border-radius: 8px;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* ── Section header ── */
  .section-hd {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 4px 0 8px; padding: 0 2px;
  }

  /* ── Saturday banner ── */
  .day-banner {
    margin: 0 16px 12px;
    padding: 10px 14px;
    background: rgba(245,166,35,.1);
    border: 1px solid rgba(245,166,35,.25);
    border-radius: 12px;
    font-size: 12px;
    color: var(--orange);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .day-banner-toggle {
    font-size: 11px; font-weight: 600;
    background: none; border: 1px solid currentColor;
    color: inherit; padding: 3px 8px; border-radius: 8px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }

  .feriale-tag {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: var(--orange); background: rgba(245,166,35,.12);
    padding: 2px 6px; border-radius: 8px;
  }

  /* ── Info bar ── */
  .info-bar {
    padding: 0 18px 20px; font-size: 11px; color: var(--muted); line-height: 1.5; text-align: center;
  }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">🚌</span>
  <div>
    <div style="font-size:17px;font-weight:700;line-height:1">Bus AQ</div>
    <div style="font-size:11px;color:var(--muted)">AMA L'Aquila</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="dir-bar">
  <button class="dir-btn active" id="btn-uni" onclick="setDir('uni')">
    &#x1F3EB; Vado<br>all'Università
  </button>
  <button class="dir-btn home" id="btn-home" onclick="setDir('home')">
    &#x1F3E0; Torno<br>a Casa
  </button>
</div>

<div class="stops-row">
  <div class="stop-chip active" id="chip-origin" onclick="openPicker('origin')">
    <div class="label">Da</div>
    <div class="name" id="origin-name">Viale Gran Sasso</div>
  </div>
  <span class="stop-arrow">&#x2192;</span>
  <div class="stop-chip" id="chip-dest" onclick="openPicker('dest')">
    <div class="label">A</div>
    <div class="name" id="dest-name">Coppito</div>
  </div>
</div>

<div class="day-banner" id="day-banner" style="display:none">
  <span>&#x1F4C5; Sabato · corse ridotte</span>
  <button class="day-banner-toggle" id="day-banner-toggle" onclick="toggleShowAll()">Mostra tutte</button>
</div>

<div class="cards" id="cards">
  <div class="empty">Caricamento orari…</div>
</div>

<div class="info-bar" id="info-bar"></div>

<!-- Stop picker modal -->
<div class="modal-overlay" id="modal" onclick="closePicker(event)">
  <div class="modal">
    <h3 id="modal-title">Seleziona fermata</h3>
    <div id="modal-options"></div>
  </div>
</div>

<script>
// ── Data & state ──────────────────────────────
let schedule = null;
let dir = 'uni';       // 'uni' | 'home'
let originStop = 'gran_sasso';
let destStop   = 'uni';
let pickerFor  = null;
let showAllTrips = false;

// Stop definitions
const STOPS = {
  gran_sasso:    { label: 'Viale Gran Sasso',    short: 'Gran Sasso' },
  terminal:      { label: 'Terminal Collemaggio', short: 'Collemaggio' },
  aquilone:      { label: "L'Aquilone",           short: 'Aquilone' },
  uni:           { label: 'Univ. Coppito',        short: 'Coppito' },
};

// Which schedule keys to use for each origin→dest pair
// key = `${origin}_${dest}` or a direction key inside each line
const ROUTE_KEYS = {
  'gran_sasso_uni':  { keys: ['to_uni'] },
  'uni_gran_sasso':  { keys: ['to_home'] },
  'terminal_uni':    { keys: ['terminal_to_uni'] },
  'uni_terminal':    { keys: ['uni_to_terminal'] },
  'aquilone_uni':    { keys: ['aquilone_to_uni'] },
  'uni_aquilone':    { keys: ['uni_to_aquilone'] },
};

const LINE_LABELS = {
  linea1:   { num: '1',   sub: '' },
  linea2ut: { num: '2',   sub: 'UT' },
  linea4:   { num: '4',   sub: '' },
  linea6sd: { num: '6',   sub: 'S/D' },
};

// ── Helpers ───────────────────────────────────
function toMin(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}
function nowMin() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}
function fmt(hhmm) { return hhmm; }
function diffLabel(diff) {
  if (diff < 0) return null;
  if (diff === 0) return ['Ora', 'now'];
  if (diff < 2)  return ['1 min', 'now'];
  if (diff < 60) return [`${diff} min`, diff < 10 ? 'now' : 'soon'];
  const h = Math.floor(diff/60), m = diff % 60;
  return [m > 0 ? `${h}h ${m}m` : `${h}h`, 'later'];
}

// ── Load schedule ─────────────────────────────
fetch('schedule.json')
  .then(r => r.json())
  .then(data => { schedule = data; render(); setInterval(render, 30000); })
  .catch(() => {
    document.getElementById('cards').innerHTML =
      '<div class="empty">Impossibile caricare gli orari.<br>Riprova dopo aver ripristinato la connessione.</div>';
  });

// ── Clock ─────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
updateClock(); setInterval(updateClock, 10000);

// ── Direction control ─────────────────────────
function setDir(d) {
  dir = d;
  document.getElementById('btn-uni').classList.toggle('active', d === 'uni');
  document.getElementById('btn-home').classList.toggle('active', d === 'home');
  // Reset stops to default for each direction
  if (d === 'uni') {
    originStop = 'gran_sasso'; destStop = 'uni';
  } else {
    originStop = 'uni'; destStop = 'gran_sasso';
  }
  updateChips(); render();
}

function updateChips() {
  document.getElementById('origin-name').textContent = STOPS[originStop].label;
  document.getElementById('dest-name').textContent   = STOPS[destStop].short;
}

// ── Stop picker ───────────────────────────────
const ORIGIN_OPTS_UNI  = ['gran_sasso', 'terminal', 'aquilone'];
const ORIGIN_OPTS_HOME = ['uni'];
const DEST_OPTS_UNI    = ['uni'];
const DEST_OPTS_HOME   = ['gran_sasso', 'terminal', 'aquilone'];

function openPicker(which) {
  pickerFor = which;
  const opts = which === 'origin'
    ? (dir === 'uni' ? ORIGIN_OPTS_UNI : ORIGIN_OPTS_HOME)
    : (dir === 'uni' ? DEST_OPTS_UNI   : DEST_OPTS_HOME);

  if (opts.length <= 1) return; // nothing to choose

  const current = which === 'origin' ? originStop : destStop;
  document.getElementById('modal-title').textContent =
    which === 'origin' ? 'Fermata di partenza' : 'Fermata di arrivo';

  document.getElementById('modal-options').innerHTML = opts.map(s => `
    <div class="stop-option ${s === current ? 'selected' : ''}" onclick="selectStop('${s}')">
      <div class="dot"></div>
      <span>${STOPS[s].label}</span>
    </div>`).join('');

  document.getElementById('modal').classList.add('open');
}

function closePicker(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

function selectStop(s) {
  if (pickerFor === 'origin') originStop = s;
  else destStop = s;
  document.getElementById('modal').classList.remove('open');
  updateChips(); render();
}

// ── Saturday toggle ───────────────────────────
function toggleShowAll() {
  showAllTrips = !showAllTrips;
  document.getElementById('day-banner-toggle').textContent = showAllTrips ? 'Solo sabato' : 'Mostra tutte';
  render();
}

// ── Render trips ──────────────────────────────
function getTrips() {
  if (!schedule) return [];
  const routeKey = `${originStop}_${destStop}`;
  const def = ROUTE_KEYS[routeKey];
  if (!def) return [];

  const now = nowMin();
  const isSaturday = new Date().getDay() === 6;
  const all = [];

  for (const [lineKey, lineData] of Object.entries(schedule)) {
    for (const key of def.keys) {
      const trips = lineData[key];
      if (!trips) continue;
      for (const trip of trips) {
        if (isSaturday && trip.no_saturday && !showAllTrips) continue;
        const depMin = toMin(trip.dep);
        const diff = depMin - now;
        if (diff < -2) continue; // already departed (allow 2 min grace)
        all.push({
          dep: trip.dep, arr: trip.arr,
          linea: lineKey,
          variant: trip.linea || null,
          scolastica: trip.scolastica,
          no_saturday: trip.no_saturday,
          depMin, diff
        });
      }
    }
  }
  // Sort by departure
  all.sort((a, b) => a.depMin - b.depMin || a.linea.localeCompare(b.linea));
  return all;
}

function render() {
  if (!schedule) return;
  const isSaturday = new Date().getDay() === 6;
  const banner = document.getElementById('day-banner');
  banner.style.display = isSaturday ? 'flex' : 'none';

  const trips = getTrips();
  const container = document.getElementById('cards');

  if (trips.length === 0) {
    container.innerHTML = '<div class="empty">Nessuna corsa disponibile nei prossimi orari.<br>Controlla domani mattina!</div>';
    document.getElementById('info-bar').textContent = '';
    return;
  }

  const shown = trips.slice(0, 3); // next 3
  container.innerHTML = shown.map((trip, i) => {
    const lb = LINE_LABELS[trip.linea] || { num: '?', sub: '' };
    const [cntTxt, cntClass] = diffLabel(trip.diff) || ['–', 'later'];
    const isNext = i === 0;
    const fromLabel = STOPS[originStop]?.short || originStop;
    const toLabel   = STOPS[destStop]?.short   || destStop;

    return `
    <div class="card${isNext ? ' next' : ''}">
      <div class="linea-badge">
        <div class="num">${lb.num}</div>
        ${trip.variant ? `<div class="sub">${trip.variant}</div>` : (lb.sub ? `<div class="sub">${lb.sub}</div>` : '')}
      </div>
      <div class="times">
        <span class="dep-time">${fmt(trip.dep)}</span>
        <span class="arr-label">arr.</span>
        <span class="arr-time">${fmt(trip.arr)}</span>
      </div>
      <div class="countdown ${cntClass}">${cntTxt}</div>
      <div class="stop-names">${fromLabel} → ${toLabel}</div>
      ${trip.scolastica ? '<div class="scolastica-tag">scolastica</div>' : ''}
      ${(isSaturday && showAllTrips && trip.no_saturday) ? '<div class="feriale-tag">solo feriale</div>' : ''}
    </div>`;
  }).join('');

  // Info bar: remaining trips count
  const remaining = trips.length - 3;
  const lastTrip = trips[trips.length - 1];
  document.getElementById('info-bar').textContent =
    remaining > 0
      ? `+${remaining} cors${remaining === 1 ? 'a' : 'e'} fino alle ${lastTrip.dep}`
      : `Ultima corsa alle ${lastTrip.dep}`;
}

// ── Service Worker ────────────────────────────
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('sw.js').catch(() => {});

// ── Init ──────────────────────────────────────
updateChips();
</script>
</body>
</html>
